name: Deploy App

on:
  push:
    branches:
      - main    
jobs:
  prepare-env:
    runs-on: [self-hosted] 
    steps:
      - name: Create .env file
        run: |
          # Переходим в папку проекта и записываем секрет в .env
          mkdir -p ${{vars.DEPLOY_PATH}}/${{ github.event.repository.name }}
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" > ${{vars.DEPLOY_PATH}}/${{ github.event.repository.name }}/.env 
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> ${{vars.DEPLOY_PATH}}/${{ github.event.repository.name }}/.env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ${{vars.DEPLOY_PATH}}/${{ github.event.repository.name }}/.env 
          echo "OPENID_CLIENT_ID=${{ secrets.OPENID_CLIENT_ID }}" >> ${{vars.DEPLOY_PATH}}/${{ github.event.repository.name }}/.env 
          echo "OPENID_CLIENT_SECRET=${{ secrets.OPENID_CLIENT_SECRET }}" >> ${{vars.DEPLOY_PATH}}/${{ github.event.repository.name }}/.env 

  call-deploy:
    needs: [prepare-env]
    uses: leoserverteam/DevOpsTemplates/.github/workflows/onlycompose.yml@main
    with:
      project_name: ${{ github.event.repository.name }}

  call-nginx:
    needs: [call-deploy]
    uses: leoserverteam/DevOpsTemplates/.github/workflows/deploynginx.yml@main
