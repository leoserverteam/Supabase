
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - cloudbeaver_net

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: unless-stopped
    ports:
      - "127.0.0.1:8978:8978"
    volumes:
      - ./cloudbeaver-data:/opt/cloudbeaver/workspace
    networks:
      - cloudbeaver_net
    depends_on:
      - postgres
    environment:
      - CLOUDBEAVER_AUTH_OPENID_DISABLE=false
      - CLOUDBEAVER_AUTH_OPENID_CLIENT_ID=${OPENID_CLIENT_ID}
      - CLOUDBEAVER_AUTH_OPENID_CLIENT_SECRET=${OPENID_CLIENT_SECRET}
      - CLOUDBEAVER_AUTH_OPENID_AUTH_URL=https://leonet.site/application/o/authorize/
      - CLOUDBEAVER_AUTH_OPENID_TOKEN_URL=https://leonet.site/application/o/token/
      - CLOUDBEAVER_AUTH_OPENID_USER_INFO_URL=https://leonet.site/application/o/userinfo/
      - CLOUDBEAVER_AUTH_OPENID_DISPLAY_NAME=Вход через SSO

networks:
  cloudbeaver_net:
    driver: bridge
